<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chemia detailingowa</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #16161a;
  color: #e0e0da;
  padding: 20px 14px 60px;
}

h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #666; margin-bottom: 20px; }

/* FILTRY */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.filter-bar button {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid #444;
  background: transparent;
  color: #aaa;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
}
.filter-bar button.on {
  background: #fff;
  color: #111;
  border-color: #fff;
}

/* SORTOWANIE */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.sort-bar span { font-size: 12px; color: #666; }
.sort-bar button {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #222;
  color: #aaa;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  touch-action: manipulation;
}
.sort-bar button.on {
  background: #333;
  color: #fff;
  border-color: #666;
}

/* SEKCJA KATEGORII */
.cat {
  background: #1e1e24;
  border: 1px solid #2e2e38;
  border-radius: 10px;
  margin-bottom: 10px;
  overflow: hidden;
}

.cat-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 13px 16px;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  background: #1e1e24;
}
.cat-head:active { background: #25252c; }
.cat-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #888; }
.cat-right { display: flex; align-items: center; gap: 8px; }
.cat-badge { font-size: 10px; background: #2a2a32; color: #666; padding: 2px 8px; border-radius: 10px; }
.cat-arrow { color: #555; font-size: 13px; transition: transform .2s; }
.cat.closed .cat-arrow { transform: rotate(-90deg); }

/* INFO KARTY */
.cat-info {
  border-top: 1px solid #2e2e38;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 14px;
  background: #1a1a20;
}
.cat.closed .cat-info,
.cat.closed .cat-products { display: none; }

.info-card {
  background: #25252c;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px 12px;
}
.info-card-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 7px;
}
.info-card-title.b { color: #5599dd; }
.info-card-title.g { color: #44bb88; }
.info-card-title.a { color: #cc9933; }
.info-card p { font-size: 11px; color: #999; line-height: 1.55; }
.info-card ul { list-style: none; }
.info-card ul li {
  font-size: 11px; color: #bbb; line-height: 1.6;
  padding-left: 14px; position: relative;
}
.info-card ul li::before { content: '→'; position: absolute; left: 0; color: #555; }
.tool { display: inline-block; font-size: 10px; padding: 2px 8px; margin: 2px 2px 0 0; border-radius: 4px; background: #2e2e38; color: #999; border: 1px solid #3a3a48; }
.info-note { font-size: 11px; color: #777; margin-top: 7px; line-height: 1.5; }

/* PRODUKT */
.cat-products { border-top: 1px solid #2e2e38; }

.prod {
  padding: 13px 16px;
  border-bottom: 1px solid #25252c;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto auto;
  gap: 0 12px;
}
.prod:last-child { border-bottom: none; }
.prod.hide { display: none; }

.prod-top {
  grid-column: 1; grid-row: 1;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  margin-bottom: 5px;
}
.prod-mid {
  grid-column: 1; grid-row: 2;
  margin-bottom: 4px;
}
.prod-bot {
  grid-column: 1 / 3; grid-row: 3;
  border-top: 1px solid #25252c;
  margin-top: 8px; padding-top: 7px;
}
.prod-right {
  grid-column: 2; grid-row: 1 / 3;
  display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
}

.pill {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
  white-space: nowrap;
}
.stag {
  font-size: 10px; color: #666;
  background: #25252c; padding: 2px 7px;
  border-radius: 4px; white-space: nowrap;
}
.prod-name { font-weight: 700; font-size: 14px; line-height: 1.3; }
.prod-sub  { font-size: 11px; color: #888; margin-top: 1px; }
.prod-desc { font-size: 12px; color: #999; line-height: 1.55; }
.stars     { color: #c8a020; font-size: 13px; }
.price     { font-weight: 700; font-size: 15px; white-space: nowrap; }
.vol       { font-size: 11px; color: #555; }

/* BRAK WYNIKÓW */
.empty { display: none; text-align: center; padding: 30px; color: #555; font-size: 14px; }
.empty.show { display: block; }

/* PODSUMOWANIE */
.summary {
  margin-top: 20px;
  background: #1e1e24;
  border: 1px solid #2e2e38;
  border-radius: 10px;
  padding: 14px;
}
.summary h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #555; margin-bottom: 12px; }
.sum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.sum-item { background: #25252c; border: 1px solid #333; border-radius: 8px; padding: 10px 12px; }
.sum-desc { font-size: 11px; color: #666; margin: 5px 0; line-height: 1.4; }
.sum-price { font-weight: 700; font-size: 14px; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .cat-info { grid-template-columns: 1fr; }
  .sum-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 380px) {
  .sum-grid { grid-template-columns: 1fr; }
  .prod-name { font-size: 13px; }
}
</style>
</head>

// ─── STAN ───────────────────────────────────────────────

// ─── BUDUJ HTML ─────────────────────────────────────────
function buildPill(brand) {
  return `<span class="pill" style="background:${B[brand].bg};color:${B[brand].c}">${B[brand].name}</span>`;
}

function buildStars(n) {
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function buildInfoCard(card) {
  let body = '';
  if (card.text)  body = `<p>${card.text}</p>`;
  if (card.items) body = `<ul>${card.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
  if (card.tools) {
    body = card.tools.map(t => `<span class="tool">${t}</span>`).join('') +
           (card.note ? `<p class="info-note">${card.note}</p>` : '');
  }
  return `<div class="info-card">
    <div class="info-card-title ${card.cls}">${card.title}</div>
    ${body}
  </div>`;
}

function buildProd(p, catId) {
  return `<div class="prod" data-brand="${p.brand}" data-price="${p.price}" data-rating="${p.rating}" data-cat="${catId}">
    <div class="prod-top">
      ${buildPill(p.brand)}
      <span class="stag">${p.stage}</span>
    </div>
    <div class="prod-mid">
      <div class="prod-name">${p.name}</div>
      <div class="prod-sub">${p.sub}</div>
    </div>
    <div class="prod-right">
      <span class="stars">${buildStars(p.rating)}</span>
      <span class="price">~${p.price} zł</span>
      <span class="vol">${p.vol}</span>
    </div>
    <div class="prod-bot">
      <p class="prod-desc">${p.desc}</p>
    </div>
  </div>`;
}

      <div class="cat-head" onclick="toggleCat('${cat.id}')">
        <span class="cat-title">${cat.title}</span>
        <div class="cat-right">
          <span class="cat-badge" id="badge-${cat.id}">${cat.prods.length} produktów</span>
          <span class="cat-arrow">▾</span>
        </div>
      </div>
      <div class="cat-info">
        ${cat.info.map(buildInfoCard).join('')}
      </div>
      <div class="cat-products" id="prods-${cat.id}">
        ${cat.prods.map(p => buildProd(p, cat.id)).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('summary').innerHTML = `
    <h3>Orientacyjny koszt kompletu</h3>
    <div class="sum-grid">
      ${SUMS.map(s => `
        <div class="sum-item">
          ${buildPill(s.brand)}
          <p class="sum-desc">${s.desc}</p>
          <div class="sum-price">${s.price}</div>
        </div>
      `).join('')}
    </div>
  `;
}

// ─── FILTROWANIE ────────────────────────────────────────
function doFilter() {
  let total = 0;

  CATS.forEach(cat => {
    const container = document.getElementById('prods-' + cat.id);
    const section   = document.getElementById('cat-' + cat.id);
    const badge     = document.getElementById('badge-' + cat.id);
    const prods     = container.querySelectorAll('.prod');

    // sortuj jeśli trzeba
    if (sortKey) {
      const arr = Array.from(prods);
      arr.sort((a, b) => (parseFloat(a.dataset[sortKey]) - parseFloat(b.dataset[sortKey])) * sortDir);
      arr.forEach(el => container.appendChild(el));
    }

    // pokaż / ukryj
    let visible = 0;
    prods.forEach(p => {
      const show = activeBrand === 'all' || p.dataset.brand === activeBrand;
      p.classList.toggle('hide', !show);
      if (show) visible++;
    });

    // aktualizuj badge i sekcję
    badge.textContent = visible + ' produktów';
    section.style.display = visible > 0 ? '' : 'none';
    total += visible;
  });

  document.getElementById('empty').classList.toggle('show', total === 0);
}

// ─── EVENTY ─────────────────────────────────────────────
function toggleCat(id) {
  document.getElementById('cat-' + id).classList.toggle('closed');
}

// filtry marek
document.querySelector('.filter-bar').addEventListener('click', function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  activeBrand = btn.dataset.brand;
  doFilter();
});

// sortowanie
document.getElementById('sort-price').addEventListener('click', function() {
  if (sortKey === 'price') { sortDir *= -1; }
  else { sortKey = 'price'; sortDir = 1; }
  this.textContent = 'Cena ' + (sortDir === 1 ? '↑' : '↓');
  document.getElementById('sort-rating').textContent = 'Ocena ↕';
  doFilter();
});

document.getElementById('sort-rating').addEventListener('click', function() {
  if (sortKey === 'rating') { sortDir *= -1; }
  else { sortKey = 'rating'; sortDir = -1; }
  this.textContent = 'Ocena ' + (sortDir === -1 ? '↓' : '↑');
  document.getElementById('sort-price').textContent = 'Cena ↕';
  doFilter();
});

// ─── INIT ───────────────────────────────────────────────
buildCatalog();
doFilter();
</script>
</body>
</html>
